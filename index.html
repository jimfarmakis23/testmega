<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Τα Βίντεό μου από το Mega.nz</title>
    <style>
        /* Responsive video iframe */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Αυτό διατηρεί την αναλογία 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Παρακολούθησε τα Βίντεό μου!</h1>

    <!-- Ενσωμάτωση βίντεο από Mega.nz μέσω Embed Link -->
    <div class="video-container">
        <iframe width="2160" height="1440" frameborder="0" 
                src="https://mega.nz/embed/ywNjyKSR#qw305qpksi8NNlnZ4yZpgnrRTZ4Rbbq9pPlccQHyKkw!1a" 
                allowfullscreen allow="autoplay;">
        </iframe>
    </div>

</body>
</html>
